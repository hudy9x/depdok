name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
env:
  NODE_OPTIONS: '--max-old-space-size=6144'

jobs:
  publish-tauri:
    if: "${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'build:') || contains(github.event.head_commit.message, 'fix(build):') }}"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above)
            args: '--target aarch64-apple-darwin'
          # - platform: 'macos-latest' # for Intel based macs
          #   args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.25.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # === BỔ SUNG: Cài LLVM (libclang) và Ninja cho Windows để build llama-cpp-sys ===
      - name: Install LLVM and Ninja (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install llvm ninja -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
      # === Hết phần bổ sung ===

      - name: Install frontend dependencies
        run: pnpm install

      - name: Generate app version from package.json
        id: get_version
        # if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "--------------------------------"
          echo "The current version is: $VERSION"
          echo "--------------------------------"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      # End ----------------------------------

      # Update Tauri pubkey start ----------------------------------
      - name: Update Tauri pubkey
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: node scripts/update-tauri-pubkey.js
      # End ----------------------------------

      # Generate changelog start ----------------------------------
      - name: Generate Changelog
        id: generate_changelog
        if: matrix.platform == 'macos-latest'
        run: |
          # Read and store changelog content
          CHANGELOG_CONTENT=$(cat CHANGELOG.md)
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      # End ----------------------------------


      # Build MCP server
      - name: Build MCP server
        shell: bash
        run: |
          TARGET_FLAG=""
          if [[ "${{ matrix.args }}" =~ --target\ ([a-zA-Z0-9_-]+) ]]; then
            TARGET_FLAG="--target ${BASH_REMATCH[1]}"
          fi
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin depdok-mcp-server $TARGET_FLAG

      # Build and upload release
      - uses: tauri-apps/tauri-action@v0
        name: Build and upload release
        id: tauri_build
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # License Configuration Polar.sh
          VITE_POLAR_ORG_ID: ${{ secrets.VITE_POLAR_ORG_ID }}
          TAURI_GRACE_PERIOD_DAYS: ${{ secrets.TAURI_GRACE_PERIOD_DAYS }}

        with:
          tagName: v${{ env.VERSION }}
          releaseName: 'v${{ env.VERSION }}'
          releaseBody: ${{ env.CHANGELOG }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  trigger-download-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=v$VERSION" >> $GITHUB_ENV
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: v$VERSION"

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.REPO_DEPDOK_GITHUB_TOKEN }}
        run: |
          echo "================================"
          echo "📝 Publishing draft release"
          echo "================================"
          
          # Get the draft release
          DRAFT_RELEASE=$(gh release view "${{ env.VERSION }}" --json isDraft,id,tagName)
          IS_DRAFT=$(echo "$DRAFT_RELEASE" | jq -r '.isDraft')
          
          if [ "$IS_DRAFT" = "true" ]; then
            echo "✅ Found draft release: ${{ env.VERSION }}"
            echo "📤 Publishing release as latest..."
            
            gh release edit "${{ env.VERSION }}" \
              --draft=false \
              --latest
            
            echo "✅ Release published successfully!"
          else
            echo "ℹ️  Release ${{ env.VERSION }} is already published"
          fi

      - name: Trigger download release workflow
        env:
          GH_TOKEN: ${{ secrets.REPO_DEPDOK_GITHUB_TOKEN }}
        run: |
          echo "================================"
          echo "🚀 Triggering download release workflow"
          echo "================================"
          
          gh workflow run trigger-download-release.yml \
            --repo ${{ github.repository }} \
            --field public_repo="hudy9x/depdok-ladi"
          
          echo "✅ Workflow triggered successfully!"